name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────
  # Build macOS DMGs (arm64 + x64 via matrix)
  # ──────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-26-intel
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          rm -f "$CERTIFICATE_PATH"

      - name: Regenerate aboutlibraries.json
        run: ./gradlew :composeApp:exportLibraryDefinitions --stacktrace

      - name: Build distributable app
        # writeNucleusExecutableMarker depends on createDistributable and
        # drops `.nucleus-executable-type` into Contents/MacOS BEFORE the
        # subsequent codesign step seals the bundle.
        run: ./gradlew :composeApp:writeNucleusExecutableMarker --stacktrace

      - name: Sign app bundle (inside-out)
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          APP_DIR="$(pwd)/composeApp/build/compose/binaries/main/app/AgentBelay.app"
          IDENTITY="$MACOS_SIGNING_IDENTITY"
          ENTITLEMENTS=$(find "$(pwd)/composeApp/build/compose" -type f -name "default-entitlements.plist" -print -quit)
          if [ -z "$ENTITLEMENTS" ]; then
            echo "ERROR: No entitlements file found."
            exit 1
          fi

          # [1/7] Sign native libraries inside JARs
          echo "[1/7] Signing native libraries inside JARs..."
          find "$APP_DIR/Contents/app" -name "*.jar" | while read -r jar; do
            JAR_LIBS=$(jar tf "$jar" | grep -E '\.(dylib|jnilib|so)$' || true)
            if [ -n "$JAR_LIBS" ]; then
              echo "  Processing: $(basename "$jar")"
              JAR_WORK=$(mktemp -d)
              pushd "$JAR_WORK" > /dev/null
              SIGNED_LIBS=()
              while IFS= read -r lib; do
                [ -n "$lib" ] || continue
                jar xf "$jar" "$lib"
                if ! file "$lib" | grep -q "Mach-O"; then
                  echo "    Skipping (not Mach-O): $lib"
                  continue
                fi
                echo "    Signing: $lib"
                codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
                SIGNED_LIBS+=("$lib")
              done <<< "$JAR_LIBS"
              if [ ${#SIGNED_LIBS[@]} -gt 0 ]; then
                for lib in "${SIGNED_LIBS[@]}"; do
                  jar uf "$jar" "$lib"
                done
              fi
              popd > /dev/null
              rm -rf "$JAR_WORK"
            fi
          done

          # [2/7] Sign loose .dylib files
          echo "[2/7] Signing loose .dylib files..."
          find "$APP_DIR" -name "*.dylib" -type f | while read -r lib; do
            echo "  Signing: ${lib#$APP_DIR/}"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
          done

          # [3/7] Sign loose .jnilib files
          echo "[3/7] Signing loose .jnilib files..."
          find "$APP_DIR" -name "*.jnilib" -type f | while read -r lib; do
            echo "  Signing: ${lib#$APP_DIR/}"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
          done

          # [4/7] Sign files in Contents/MacOS
          # Sign non-Mach-O files (e.g. Nucleus's `.nucleus-executable-type`
          # marker) FIRST so they carry a valid signature before the main
          # executable's seal walks the bundle. If codesign signs the main
          # exe while a sibling in Contents/MacOS is still unsigned, the
          # bundle seal fails with "code object is not signed at all /
          # In subcomponent: <file>".
          echo "[4/7] Signing files in Contents/MacOS..."
          find "$APP_DIR/Contents/MacOS" -type f | while read -r f; do
            if ! file "$f" | grep -q "Mach-O"; then
              echo "  Signing (data): ${f#$APP_DIR/}"
              codesign --force --timestamp --sign "$IDENTITY" "$f"
            fi
          done
          find "$APP_DIR/Contents/MacOS" -type f | while read -r exe; do
            if file "$exe" | grep -q "Mach-O"; then
              echo "  Signing (executable): ${exe#$APP_DIR/}"
              codesign --force --options runtime --timestamp \
                --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$exe"
            fi
          done

          # [5/7] Sign runtime executables (bin/ and lib/ non-dylib executables like jspawnhelper, simengine)
          echo "[5/7] Signing runtime executables..."
          for dir in "$APP_DIR/Contents/runtime/Contents/Home/bin" "$APP_DIR/Contents/runtime/Contents/Home/lib"; do
            if [ -d "$dir" ]; then
              find "$dir" -type f ! -name "*.dylib" ! -name "*.jnilib" ! -name "*.jar" \
                  ! -name "*.properties" ! -name "*.cfg" ! -name "*.dat" ! -name "*.txt" \
                  ! -name "*.conf" ! -name "*.plist" ! -name "modules" ! -name "*.map" \
                  ! -name "classlist" ! -name "jrt-fs.jar" | while read -r exe; do
                # Only sign Mach-O binaries
                if file "$exe" | grep -q "Mach-O"; then
                  echo "  Signing: ${exe#$APP_DIR/}"
                  codesign --force --options runtime --timestamp --sign "$IDENTITY" "$exe"
                fi
              done
            fi
          done

          # [6/7] Sign runtime bundle
          echo "[6/7] Signing runtime bundle..."
          if [ -d "$APP_DIR/Contents/runtime" ]; then
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$APP_DIR/Contents/runtime"
          fi

          # [7/7] Sign the .app bundle
          echo "[7/7] Signing app bundle with entitlements..."
          echo "  Using entitlements: $ENTITLEMENTS"
          codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$IDENTITY" "$APP_DIR"

          echo "Verifying app bundle signature..."
          codesign --verify --deep --strict --verbose=2 "$APP_DIR"

      - name: Package and sign DMG
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          IDENTITY="$MACOS_SIGNING_IDENTITY"
          APP_DIR="$(pwd)/composeApp/build/compose/binaries/main/app"
          DMG_DIR="$(pwd)/composeApp/build/compose/binaries/main/dmg"
          mkdir -p "$DMG_DIR"
          DMG_FILE="$DMG_DIR/AgentBelay-${{ matrix.arch }}.dmg"

          hdiutil create -volname "AgentBelay" -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_FILE"
          codesign --force --timestamp --sign "$IDENTITY" "$DMG_FILE"
          echo "Created: $DMG_FILE"

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_FILE="$(pwd)/composeApp/build/compose/binaries/main/dmg/AgentBelay-${{ matrix.arch }}.dmg"
          if [ ! -f "$DMG_FILE" ]; then
            echo "ERROR: DMG not found at $DMG_FILE"
            exit 1
          fi
          echo "Submitting for notarization: $DMG_FILE"

          SUBMIT_LOG="$RUNNER_TEMP/notarytool-submit.log"
          xcrun notarytool submit "$DMG_FILE" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait 2>&1 | tee "$SUBMIT_LOG" || true

          # Extract submission ID for log retrieval
          SUBMISSION_ID=$(grep -m1 '^\s*id:' "$SUBMIT_LOG" | awk '{print $2}')

          # Check if notarization was accepted
          if ! grep -q 'status: Accepted' "$SUBMIT_LOG"; then
            echo "::error::Notarization was not accepted"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$NOTARIZATION_APPLE_ID" \
                --password "$NOTARIZATION_PASSWORD" \
                --team-id "$NOTARIZATION_TEAM_ID" \
                "$RUNNER_TEMP/notarization-log.json" || true
              cat "$RUNNER_TEMP/notarization-log.json" 2>/dev/null || true
            fi
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_FILE"

      - name: Notarize and staple .app, then build ZIP
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_DIR="$(pwd)/composeApp/build/compose/binaries/main/app/AgentBelay.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: signed .app bundle not found at $APP_DIR"
            exit 1
          fi

          # Submit a ZIP of the .app for notarization. The DMG notarization
          # above stapled only the DMG file — for the auto-updater path
          # (ZIP-based silent replace), the .app itself must carry a stapled
          # ticket so Gatekeeper accepts it offline after our updater strips
          # com.apple.quarantine.
          NOTARIZE_ZIP="$RUNNER_TEMP/AgentBelay-notarize.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$NOTARIZE_ZIP"

          SUBMIT_LOG="$RUNNER_TEMP/notarytool-zip-submit.log"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait 2>&1 | tee "$SUBMIT_LOG" || true

          SUBMISSION_ID=$(grep -m1 '^\s*id:' "$SUBMIT_LOG" | awk '{print $2}')

          if ! grep -q 'status: Accepted' "$SUBMIT_LOG"; then
            echo "::error::ZIP notarization was not accepted"
            if [ -n "${SUBMISSION_ID:-}" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$NOTARIZATION_APPLE_ID" \
                --password "$NOTARIZATION_PASSWORD" \
                --team-id "$NOTARIZATION_TEAM_ID" \
                "$RUNNER_TEMP/notarization-zip-log.json" || true
              cat "$RUNNER_TEMP/notarization-zip-log.json" 2>/dev/null || true
            fi
            exit 1
          fi

          echo "Stapling notarization ticket to .app bundle..."
          xcrun stapler staple "$APP_DIR"

          # Re-create the final ZIP from the now-stapled .app. ditto preserves
          # macOS metadata + symlinks so the runtime's `ditto -x -k` extraction
          # restores the bundle byte-identically.
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_DIR="$(pwd)/composeApp/build/compose/binaries/main/zip"
          mkdir -p "$ZIP_DIR"
          ZIP_FILE="$ZIP_DIR/AgentBelay-${VERSION}-macos-${{ matrix.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$ZIP_FILE"
          rm -f "$NOTARIZE_ZIP"
          echo "Created: $ZIP_FILE"

      - name: Collect artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts
          cp composeApp/build/compose/binaries/main/dmg/*.dmg \
            "artifacts/AgentBelay-${VERSION}-macos-${{ matrix.arch }}.dmg"
          cp composeApp/build/compose/binaries/main/zip/*.zip artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-${{ matrix.arch }}-dist
          path: |
            artifacts/*.dmg
            artifacts/*.zip
          retention-days: 1
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  # ──────────────────────────────────────────────────────
  # Build Windows MSI (with opt-in signing)
  # ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_PFX_CERTIFICATE != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Regenerate aboutlibraries.json
        run: ./gradlew :composeApp:exportLibraryDefinitions --stacktrace

      - name: Build MSI
        run: ./gradlew :composeApp:packageMsi --stacktrace

      - name: Sign MSI
        if: env.HAS_WINDOWS_CERT == 'true'
        env:
          WINDOWS_PFX_CERTIFICATE: ${{ secrets.WINDOWS_PFX_CERTIFICATE }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: powershell
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_PFX_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $msi = Get-ChildItem -Path "composeApp\build\compose\binaries\main\msi\*.msi" | Select-Object -First 1
          if (-not $msi) { throw "No MSI found" }

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }

          & $signtool.FullName sign /f $certPath /p $env:WINDOWS_PFX_PASSWORD `
            /fd SHA256 /tr https://timestamp.digicert.com /td SHA256 $msi.FullName

          Remove-Item -Force $certPath -ErrorAction SilentlyContinue

      - name: Collect artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts
          cp composeApp/build/compose/binaries/main/msi/*.msi \
            "artifacts/AgentBelay-${VERSION}-windows-x64.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-msi
          path: artifacts/*.msi
          retention-days: 1
          if-no-files-found: error

      - name: Cleanup certificate
        if: always()
        shell: powershell
        run: Remove-Item -Force (Join-Path $env:RUNNER_TEMP "cert.pfx") -ErrorAction SilentlyContinue

  # ──────────────────────────────────────────────────────
  # Build Linux DEB + JAR
  # ──────────────────────────────────────────────────────
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Regenerate aboutlibraries.json
        run: ./gradlew :composeApp:exportLibraryDefinitions --stacktrace

      - name: Build DEB and JAR
        run: ./gradlew :composeApp:packageDeb :composeApp:jvmJar --stacktrace

      - name: Collect artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts
          cp composeApp/build/compose/binaries/main/deb/*.deb \
            "artifacts/AgentBelay-${VERSION}-linux-amd64.deb"
          cp composeApp/build/libs/composeApp-jvm.jar \
            "artifacts/AgentBelay-${VERSION}.jar"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-packages
          path: artifacts/*
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────
  # Build changelog
  # ──────────────────────────────────────────────────────
  changelog:
    name: Build Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@bcae7115752d4ed746ff92feb666574428a79415 # v6.2.1
        with:
          ignorePreReleases: ${{ !contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────
  # Generate SHA-256 checksums
  # ──────────────────────────────────────────────────────
  checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: all-artifacts
        run: sha256sum * | tee CHECKSUMS-SHA256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checksums
          path: all-artifacts/CHECKSUMS-SHA256.txt
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────
  # Generate Nucleus auto-update metadata (latest-*.yml)
  #
  # All YAML is emitted via printf with strictly whitelisted variables:
  #   - filenames must match ^[A-Za-z0-9._+-]+$  (we built them, but check)
  #   - sha512 is base64 (alnum + +/=) computed via openssl
  #   - size is digits from `stat -c%s`
  #   - version is ${GITHUB_REF_NAME#v}
  # No artifact-derived value is shell-eval'd or interpolated unsafely.
  # The runtime's YamlParser only consumes `version`, `files[]`, `releaseDate`.
  # Pre-release tags (containing `-`) emit `beta-*.yml`; stable tags emit
  # `latest-*.yml`. This keeps stable users from auto-pulling RC builds, since
  # the GitHub `releases/latest/download/latest-*.yml` URL skips prereleases.
  # ──────────────────────────────────────────────────────
  update-yml:
    name: Generate Update YML
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate latest-*.yml files
        working-directory: all-artifacts
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          NAME_RE='^[A-Za-z0-9._+-]+$'
          # Defense-in-depth: VERSION ends up inside a YAML scalar, so refuse
          # anything outside the whitelist even though Git ref rules already
          # forbid most injection-relevant characters.
          if ! [[ "$VERSION" =~ $NAME_RE ]]; then
            echo "::error::Unsafe VERSION derived from tag: $VERSION" >&2
            exit 1
          fi
          # Channel classifier MUST match the `prerelease:` rule in the
          # release job below (line ~696). If they diverge, a tag that
          # produces only beta-*.yml could land on a release marked stable —
          # then `releases/latest/download/latest-*.yml` 404s for users.
          if [[ "$GITHUB_REF_NAME" == *-rc* || "$GITHUB_REF_NAME" == *-b* || "$GITHUB_REF_NAME" == *-a* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="latest"
          fi
          RELEASE_DATE="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"

          mkdir -p ../yml-out

          emit_yml() {
            local out="$1"; shift
            local files=("$@")
            {
              printf 'version: %s\n' "$VERSION"
              printf 'files:\n'
              for f in "${files[@]}"; do
                [ -f "$f" ] || continue
                local name
                name="$(basename "$f")"
                if ! [[ "$name" =~ $NAME_RE ]]; then
                  echo "::error::Refusing to emit YAML for unsafe filename: $name" >&2
                  exit 1
                fi
                local sha512 size
                sha512="$(openssl dgst -sha512 -binary "$f" | base64 | tr -d '\n')"
                size="$(stat -c%s "$f")"
                # sha512 is base64 -> safe; size is digits -> safe; name was regex-checked.
                printf '  - url: %s\n' "$name"
                printf '    sha512: %s\n' "$sha512"
                printf '    size: %s\n' "$size"
              done
              printf "releaseDate: '%s'\n" "$RELEASE_DATE"
            } > "../yml-out/$out"
            echo "Wrote ../yml-out/$out:"
            cat "../yml-out/$out"
          }

          # macOS — list both DMG and ZIP. Runtime's FileSelector prefers .zip
          # for silent updates; .dmg is kept for first-install via DMG.
          mac_files=()
          for f in *-macos-*.dmg *-macos-*.zip; do
            [ -f "$f" ] && mac_files+=("$f")
          done
          if [ ${#mac_files[@]} -gt 0 ]; then
            emit_yml "${CHANNEL}-mac.yml" "${mac_files[@]}"
          fi

          # Windows — MSI only.
          win_files=()
          for f in *-windows-*.msi; do
            [ -f "$f" ] && win_files+=("$f")
          done
          if [ ${#win_files[@]} -gt 0 ]; then
            emit_yml "${CHANNEL}.yml" "${win_files[@]}"
          fi

          # Linux — DEB only (RPM/AppImage not built today).
          linux_files=()
          for f in *-linux-*.deb; do
            [ -f "$f" ] && linux_files+=("$f")
          done
          if [ ${#linux_files[@]} -gt 0 ]; then
            emit_yml "${CHANNEL}-linux.yml" "${linux_files[@]}"
          fi

      - name: Upload update YML files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: update-yml
          path: yml-out/*.yml
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────
  # Artifact attestations (SLSA provenance)
  # ──────────────────────────────────────────────────────
  attest:
    name: Attest Artifacts
    runs-on: ubuntu-latest
    needs: [checksums, update-yml]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Attest build artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            all-artifacts/*.dmg
            all-artifacts/*.zip
            all-artifacts/*.msi
            all-artifacts/*.deb
            all-artifacts/*.jar
            all-artifacts/*.yml
            all-artifacts/CHECKSUMS-SHA256.txt

  # ──────────────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [attest, changelog]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Build release body
        id: body
        env:
          CHANGELOG: ${{ needs.changelog.outputs.changelog }}
          REPO: ${{ github.repository }}
        run: |
          printf '%s\n' "$CHANGELOG" > release-body.md
          printf '\n---\n\n' >> release-body.md
          printf '## Verify your download\n\n' >> release-body.md
          printf '### SHA-256 Checksums\n\n' >> release-body.md
          printf '```\n' >> release-body.md
          cat release-assets/CHECKSUMS-SHA256.txt >> release-body.md
          printf '```\n\n' >> release-body.md
          cat >> release-body.md << 'EOF'
          <details>
          <summary>How to verify</summary>

          Download `CHECKSUMS-SHA256.txt` and the artifact, then run:

          **macOS / Linux:**
          ```bash
          sha256sum -c CHECKSUMS-SHA256.txt
          # or on macOS:
          shasum -a 256 -c CHECKSUMS-SHA256.txt
          ```

          **Windows (PowerShell):**
          ```powershell
          (Get-FileHash <file> -Algorithm SHA256).Hash
          # Compare the output with the hash listed above
          ```

          ### Artifact Attestations

          All release artifacts include [SLSA build provenance](https://slsa.dev) attestations. Verify with the [GitHub CLI](https://cli.github.com/):

          ```bash
          EOF
          printf 'gh attestation verify <file> --repo %s\n' "$REPO" >> release-body.md
          cat >> release-body.md << 'EOF'
          ```

          </details>
          EOF

      - name: Create GitHub Release
        uses: mikepenz/action-gh-release@5c3d16ffbdc3e0fbfe2c8a69a448798f5d9b30c2 # v2.0.0
        with:
          body_path: release-body.md
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-b') || contains(github.ref, '-a') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
